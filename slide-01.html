<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Aromaís — Slide 01 Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    margin: 0;
    padding: 0;
    background-color: #F5F0EB;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #2A2A2A;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 56px 80px 0 80px;
  }

  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.14em;
    color: #8A9E7A;
    text-transform: uppercase;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
  }

  .slide-label {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: #C4785A;
    text-transform: uppercase;
    margin-bottom: 52px;
  }

  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 82px;
    font-weight: 400;
    line-height: 1.05;
    color: #2A2A2A;
    margin: 0 0 52px 0;
    letter-spacing: -0.01em;
  }

  .divider {
    width: 64px;
    height: 2px;
    background-color: #C9A87C;
    margin-bottom: 48px;
  }

  .sub {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 40px;
    font-weight: 400;
    line-height: 1.35;
    color: #8A9E7A;
    margin: 0;
    font-style: italic;
  }

  /* Footer */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0 80px 64px 80px;
  }

  .footer-divider {
    width: 100%;
    height: 1px;
    background-color: #C9A87C;
    opacity: 0.35;
    margin-bottom: 36px;
  }

  .footer-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
  }

  .logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #2A2A2A;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: #8A9E7A;
    font-style: italic;
  }

  .slide-number {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: #C9A87C;
  }
</style>
</head>
<body>

  <div class="header">
    <span class="header-eyebrow">Home Fragrance</span>
  </div>

  <div class="main">
    <div class="slide-label">Você sabia?</div>
    <h1 class="headline">Você já entrou numa casa e quis morar lá sem saber por quê?</h1>
    <div class="divider"></div>
    <p class="sub">A resposta é mais simples do que parece.</p>
  </div>

  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-inner">
      <div>
        <div class="logo">Aroma&iacute;s</div>
        <div class="tagline">onde o cheiro vira memória</div>
      </div>
      <div class="slide-number">01 / 04</div>
    </div>
  </div>

</body>
</html>
